<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 840" role="img" aria-labelledby="title desc">
  <title id="title">Single-stage sparse coding for multi-vector retrieval</title>
  <desc id="desc">A schematic comparing dense multi-vector retrieval with sparse multi-vector retrieval.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
