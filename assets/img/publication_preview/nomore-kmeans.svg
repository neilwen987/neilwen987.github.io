          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        fill: #111;
      }
      .small {
        font:
          600 24px -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        fill: #111;
      }
      .caption {
        font:
          700 34px -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
